services:
  - type: web
    name: rentflow-tz-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: true
      - key: API_PUBLIC_URL
        sync: false
      - key: FASTLIPA_BASE_URL
        sync: false
      - key: FASTLIPA_PAY_ENDPOINT
        sync: false
      - key: FASTLIPA_API_KEY
        sync: false
      - key: FASTLIPA_SECRET
        sync: false
      - key: FASTLIPA_MERCHANT_ID
        sync: false
      - key: FASTLIPA_CURRENCY
        value: TZS
      - key: FASTLIPA_MOCK
        value: false
      - key: FASTLIPA_DEBUG
        sync: false
      - key: SMS_PROVIDER
        sync: false
      - key: SMS_MOCK
        sync: false
      - key: SMS_COST_TZS
        value: 50
      - key: BEEM_SMS_URL
        value: https://apisms.beem.africa/v1/send
      - key: BEEM_API_KEY
        sync: false
      - key: BEEM_SECRET_KEY
        sync: false
      - key: BEEM_SOURCE_ADDR
        value: INFO
